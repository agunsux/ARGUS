version: '3.8'

services:
  argus-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argus-decision-engine
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
